<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ── SEO ──────────────────────────────────────────────────────────────── -->
  <title>Grin API Status</title>
  <meta name="description"
        content="Live Grin node API status — block height, total difficulty, latest block, and version info. Public /v2/foreign endpoint for Grin MimbleWimble blockchain.">
  <meta name="keywords"
        content="Grin, Grin blockchain, Grin API, Grin node, MimbleWimble, privacy coin, grin-node, blockchain status, foreign API">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#ff9900">

  <!-- ── Open Graph ────────────────────────────────────────────────────────── -->
  <meta property="og:type"        content="website">
  <meta property="og:title"       content="Grin API Status">
  <meta property="og:description" content="Live Grin node API status — block height, total difficulty, and version info.">
  <meta property="og:image"       content="https://grin.mw/images/grin-logo.svg">

  <!-- ── Favicon — inline SVG, no external file needed ───────────────────── -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23ff9900'/><text y='24' x='16' text-anchor='middle' font-family='sans-serif' font-size='22' font-weight='bold' fill='white'>G</text></svg>">

  <!-- ── CSP: same-origin only ─────────────────────────────────────────────── -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self'">

  <link rel="stylesheet" href="css/status.css">
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    <h1><span>Grin</span> API Status</h1>
    <span class="network-badge" id="network-badge">—</span>
  </div>
  <div class="header-right">
    <span class="refresh-badge" id="countdown">—</span>
    <button class="theme-btn" id="theme-btn" title="Toggle light / dark theme">🌙</button>
  </div>
</header>

<main>

  <!-- Error banner — hidden until a fetch fails -->
  <div id="error-banner" class="error-banner"></div>

  <!-- ── Chain section ──────────────────────────────────────────────────── -->
  <div class="section-label">
    <span class="section-dot"></span>
    Chain
  </div>

  <div class="grid">
    <div class="card">
      <div class="card-label">Block Height</div>
      <div class="card-value dim" id="v-height">…</div>
    </div>
    <div class="card">
      <div class="card-label">Total Difficulty</div>
      <div class="card-value dim" id="v-difficulty">…</div>
    </div>
    <div class="card">
      <div class="card-label">Latest Block Hash</div>
      <div class="card-value dim small" id="v-hash">…</div>
    </div>
  </div>

  <!-- ── Node section ───────────────────────────────────────────────────── -->
  <div class="section-label">
    <span class="section-dot" style="background:var(--blue)"></span>
    Node
  </div>

  <div class="grid">
    <div class="card">
      <div class="card-label">Node Version</div>
      <div class="card-value dim" id="v-node-ver">…</div>
    </div>
    <div class="card">
      <div class="card-label">Protocol Version</div>
      <div class="card-value dim" id="v-proto-ver">…</div>
    </div>
    <div class="card">
      <div class="card-label">Header Version</div>
      <div class="card-value dim" id="v-hdr-ver">…</div>
    </div>
  </div>

</main>

<footer>
  <span id="last-updated">Connecting…</span>
  <span>
    <a href="https://github.com/Anynomouss/grin-node-toolkit" target="_blank" rel="noopener">Grin Node Toolkit</a>
    &nbsp;·&nbsp;
    <a href="https://grin.mw/" target="_blank" rel="noopener">grin.mw</a>
  </span>
</footer>

<!-- config.js is generated by the deploy script and sets GRIN_NETWORK -->
<script src="config.js"></script>
<script src="js/node-status.js"></script>
</body>
</html>
