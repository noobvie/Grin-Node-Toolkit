<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings — Mining Pool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --dark-bg: #0a0a0a;
            --dark-card: #1a2342;
            --dark-text: #00f7ff;
            --dark-dim: #666666;
            --neon-cyan: #00f7ff;
            --neon-magenta: #ff00ff;
            --neon-lime: #00ff00;
            --light-bg: #f5f7fb;
            --light-card: #ffffff;
            --light-text: #1a1a1a;
            --light-dim: #666666;
            --light-border: #e0e0e0;
            --color-cyan: #0891b2;
            --color-purple: #7c3aed;
            --color-pink: #ec4899;
            --color-orange: #f97316;
            --color-green: #22c55e;
            --color-blue: #3b82f6;
            --uranium: #b8e600;
            --uranium-dark: #7a9700;
        }

        body {
            background-color: var(--dark-bg);
            background-image:
                linear-gradient(0deg, transparent 24%, rgba(0, 247, 255, 0.05) 25%, rgba(0, 247, 255, 0.05) 26%, transparent 27%, transparent 74%, rgba(0, 247, 255, 0.05) 75%, rgba(0, 247, 255, 0.05) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(0, 247, 255, 0.05) 25%, rgba(0, 247, 255, 0.05) 26%, transparent 27%, transparent 74%, rgba(0, 247, 255, 0.05) 75%, rgba(0, 247, 255, 0.05) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            color: var(--dark-text);
            font-family: 'Courier New', monospace;
            line-height: 1.6;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.light-theme {
            background: linear-gradient(135deg, #f5f7fb 0%, #faf7ff 50%, #fff5f8 100%);
            background-attachment: fixed;
            color: var(--light-text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body.atomic-theme {
            background-color: var(--dark-bg);
            background-image:
                linear-gradient(0deg, transparent 24%, rgba(184, 230, 0, 0.04) 25%, rgba(184, 230, 0, 0.04) 26%, transparent 27%, transparent 74%, rgba(184, 230, 0, 0.04) 75%, rgba(184, 230, 0, 0.04) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(184, 230, 0, 0.04) 25%, rgba(184, 230, 0, 0.04) 26%, transparent 27%, transparent 74%, rgba(184, 230, 0, 0.04) 75%, rgba(184, 230, 0, 0.04) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            color: var(--uranium);
            font-family: 'Courier New', monospace;
        }

        @keyframes neon-glow {
            0%, 100% { text-shadow: 0 0 5px var(--neon-cyan), 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan); }
            50% { text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan), 0 0 30px var(--neon-cyan), 0 0 40px var(--neon-cyan); }
        }

        @keyframes uranium-glow {
            0%, 100% { text-shadow: 0 0 5px var(--uranium), 0 0 10px var(--uranium), 0 0 20px var(--uranium); }
            50% { text-shadow: 0 0 10px var(--uranium), 0 0 20px var(--uranium), 0 0 30px var(--uranium), 0 0 40px var(--uranium); }
        }

        @keyframes scanlines {
            0% { transform: translateY(0); }
            100% { transform: translateY(10px); }
        }

        @keyframes gradient-flow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes border-glow {
            0%, 100% { border-color: var(--neon-cyan); box-shadow: 0 0 5px var(--neon-cyan), inset 0 0 5px rgba(0, 247, 255, 0.1); }
            50% { border-color: var(--neon-magenta); box-shadow: 0 0 10px var(--neon-magenta), inset 0 0 5px rgba(255, 0, 255, 0.1); }
        }

        @keyframes border-glow-uranium {
            0%, 100% { border-color: var(--uranium); box-shadow: 0 0 5px var(--uranium), inset 0 0 5px rgba(184, 230, 0, 0.1); }
            50% { border-color: #00f7ff; box-shadow: 0 0 10px #00f7ff, inset 0 0 5px rgba(0, 247, 255, 0.1); }
        }

        @keyframes light-border-glow {
            0%, 100% { border-color: #0891b2; box-shadow: 0 4px 20px rgba(8, 145, 178, 0.2), inset 0 0 8px rgba(8, 145, 178, 0.08); }
            25% { border-color: #7c3aed; box-shadow: 0 8px 30px rgba(124, 58, 237, 0.25), inset 0 0 8px rgba(124, 58, 237, 0.1); }
            50% { border-color: #ec4899; box-shadow: 0 8px 30px rgba(236, 72, 153, 0.25), inset 0 0 8px rgba(236, 72, 153, 0.1); }
            75% { border-color: #f97316; box-shadow: 0 8px 30px rgba(249, 115, 22, 0.25), inset 0 0 8px rgba(249, 115, 22, 0.1); }
        }

        .theme-switcher {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            gap: 4px;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 6px 8px;
            border-radius: 50px;
            border: 1px solid var(--neon-cyan);
            box-shadow: 0 0 15px var(--neon-cyan);
            transition: all 0.3s ease;
        }

        body.light-theme .theme-switcher {
            background: rgba(255, 255, 255, 0.85);
            border-color: var(--color-blue);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }

        body.atomic-theme .theme-switcher {
            background: rgba(0, 0, 0, 0.6);
            border-color: var(--uranium);
            box-shadow: 0 0 15px rgba(184, 230, 0, 0.3);
        }

        .theme-btn {
            padding: 4px 8px;
            border: 1px solid var(--neon-cyan);
            background: transparent;
            color: var(--neon-cyan);
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.6em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            transition: all 0.3s ease;
        }

        .theme-btn.active {
            background: var(--neon-cyan);
            color: var(--dark-bg);
        }

        body.light-theme .theme-btn {
            border-color: var(--color-blue);
            color: var(--color-blue);
        }

        body.light-theme .theme-btn.active {
            background: var(--color-blue);
            color: white;
        }

        body.atomic-theme .theme-btn {
            border-color: var(--uranium);
            color: var(--uranium);
        }

        body.atomic-theme .theme-btn.active {
            background: var(--uranium);
            color: var(--dark-bg);
        }

        header {
            background: linear-gradient(135deg, rgba(0, 247, 255, 0.1), rgba(255, 0, 255, 0.1));
            border-bottom: 2px solid var(--neon-cyan);
            padding: 16px 20px;
            position: relative;
            overflow: hidden;
            transition: all 0.6s ease;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 247, 255, 0.03) 2px,
                rgba(0, 247, 255, 0.03) 4px
            );
            pointer-events: none;
            animation: scanlines 8s linear infinite;
        }

        body.light-theme header {
            background: linear-gradient(135deg, #3b82f6 0%, #7c3aed 50%, #ec4899 100%);
            background-size: 300% 300%;
            animation: gradient-flow 6s ease infinite;
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.15);
        }

        body.light-theme header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.15), transparent);
            border-radius: 50%;
        }

        body.atomic-theme header {
            background: linear-gradient(135deg, rgba(122, 151, 0, 0.15), rgba(184, 230, 0, 0.1));
            border-bottom: 2px solid var(--uranium);
        }

        body.atomic-theme header::before {
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(184, 230, 0, 0.03) 2px,
                rgba(184, 230, 0, 0.03) 4px
            );
        }

        .header-content {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 1.4em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            animation: neon-glow 2s ease-in-out infinite;
            transition: all 0.6s ease;
        }

        body.light-theme h1 {
            background: linear-gradient(135deg, #ffffff, rgba(255, 255, 255, 0.9));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: none;
        }

        body.atomic-theme h1 {
            animation: uranium-glow 2s ease-in-out infinite;
        }

        .header-nav {
            display: flex;
            gap: 8px;
            list-style: none;
            flex: 1;
            margin: 0;
            padding: 0;
        }

        .nav-link {
            display: inline-block;
            color: var(--dark-text);
            text-decoration: none;
            padding: 8px 14px;
            font-size: 0.75em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            border-radius: 4px;
            background: rgba(0, 247, 255, 0.1);
            border: 1px solid rgba(0, 247, 255, 0.2);
        }

        body.light-theme .nav-link {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            color: white;
        }

        body.atomic-theme .nav-link {
            background: rgba(184, 230, 0, 0.1);
            border-color: rgba(184, 230, 0, 0.2);
            color: var(--uranium);
        }

        .nav-link:hover {
            background: rgba(0, 247, 255, 0.2);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 247, 255, 0.3);
        }

        body.light-theme .nav-link:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        body.atomic-theme .nav-link:hover {
            background: rgba(184, 230, 0, 0.2);
            border-color: var(--uranium);
            box-shadow: 0 0 10px rgba(184, 230, 0, 0.3);
        }

        .nav-link.active {
            background: rgba(0, 247, 255, 0.2);
            border-color: var(--neon-cyan);
        }

        body.light-theme .nav-link.active {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
        }

        body.atomic-theme .nav-link.active {
            background: rgba(184, 230, 0, 0.2);
            border-color: var(--uranium);
        }

        .header-buttons {
            display: flex;
            gap: 8px;
        }

        .header-btn {
            background: rgba(0, 247, 255, 0.1);
            color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan);
            padding: 8px 14px;
            border-radius: 4px;
            font-size: 0.7em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            box-shadow: 0 0 8px rgba(0, 247, 255, 0.2);
        }

        body.light-theme .header-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.1);
        }

        body.atomic-theme .header-btn {
            background: rgba(184, 230, 0, 0.1);
            color: var(--uranium);
            border-color: var(--uranium);
            box-shadow: 0 0 8px rgba(184, 230, 0, 0.2);
        }

        .header-btn:hover {
            background: rgba(0, 247, 255, 0.2);
            border-color: var(--neon-magenta);
            box-shadow: 0 0 15px rgba(0, 247, 255, 0.4);
        }

        body.light-theme .header-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        body.atomic-theme .header-btn:hover {
            background: rgba(184, 230, 0, 0.2);
            border-color: var(--uranium);
            box-shadow: 0 0 15px rgba(184, 230, 0, 0.4);
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .page-title {
            font-size: 2.2em;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: neon-glow 2s ease-in-out infinite;
            margin-bottom: 40px;
            transition: all 0.6s ease;
        }

        body.light-theme .page-title {
            background: linear-gradient(135deg, #3b82f6, #7c3aed, #ec4899, #f97316);
            background-size: 300% 300%;
            animation: gradient-flow 6s ease infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        body.atomic-theme .page-title {
            animation: uranium-glow 2s ease-in-out infinite;
        }

        .settings-section {
            background: rgba(26, 35, 66, 0.3);
            border: 2px solid rgba(0, 247, 255, 0.2);
            padding: 30px;
            margin-bottom: 30px;
            border-radius: 8px;
        }

        body.light-theme .settings-section {
            background: white;
            border: 2px solid var(--light-border);
            border-radius: 12px;
        }

        body.atomic-theme .settings-section {
            background: rgba(26, 35, 66, 0.3);
            border-color: rgba(184, 230, 0, 0.2);
        }

        .settings-section h3 {
            font-size: 1.2em;
            color: var(--neon-cyan);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        body.light-theme .settings-section h3 {
            color: var(--color-blue);
        }

        body.atomic-theme .settings-section h3 {
            color: var(--uranium);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9em;
            font-weight: bold;
            color: var(--neon-lime);
        }

        body.light-theme .form-group label {
            color: #333;
        }

        body.atomic-theme .form-group label {
            color: var(--uranium);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid rgba(0, 247, 255, 0.3);
            background: rgba(0, 0, 0, 0.2);
            color: var(--dark-text);
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        body.light-theme .form-group input,
        body.light-theme .form-group select,
        body.light-theme .form-group textarea {
            background: white;
            border-color: #ddd;
            color: #333;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body.atomic-theme .form-group input,
        body.atomic-theme .form-group select,
        body.atomic-theme .form-group textarea {
            border-color: rgba(184, 230, 0, 0.3);
        }

        .btn-save {
            padding: 10px 28px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
            color: var(--dark-bg);
            border: none;
            border-radius: 4px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 247, 255, 0.3);
        }

        .btn-save:hover {
            box-shadow: 0 0 25px rgba(0, 247, 255, 0.5);
        }

        body.light-theme .btn-save {
            background: linear-gradient(135deg, var(--color-blue), var(--color-purple));
            color: white;
        }

        body.atomic-theme .btn-save {
            background: linear-gradient(135deg, var(--uranium), var(--uranium-dark));
            color: var(--dark-bg);
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            border-top: 2px solid rgba(0, 247, 255, 0.2);
            color: #666;
            font-size: 0.9em;
        }

        body.light-theme footer {
            border-top-color: rgba(59, 130, 246, 0.2);
            color: #888;
        }

        body.atomic-theme footer {
            border-top-color: rgba(184, 230, 0, 0.2);
        }

        @media (max-width: 1024px) {
            .header-nav {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .page-title {
                font-size: 1.6em;
            }

            .settings-section {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="theme-switcher">
        <button class="theme-btn active" data-theme="dark">Dark</button>
        <button class="theme-btn" data-theme="light">Light</button>
        <button class="theme-btn" data-theme="atomic">Atomic</button>
    </div>

    <header>
        <div class="header-content">
            <h1>⚛ GRINIUM</h1>
            <nav class="header-nav">
                <a href="index.html" class="nav-link">Home</a>
                <a href="admin-dashboard.html" class="nav-link">Admin</a>
                <a href="miners-stats.html" class="nav-link">Miners</a>
                <a href="payment-history.html" class="nav-link">Payouts</a>
                <a href="pool-info.html" class="nav-link">Info</a>
            </nav>
            <div class="header-buttons">
                <button class="header-btn">Profile</button>
                <button class="header-btn">Logout</button>
            </div>
        </div>
    </header>

    <div class="container">
        <h2 class="page-title">Account Settings</h2>

        <div class="settings-section">
            <h3>Profile Information</h3>
            <div class="form-group">
                <label>Username</label>
                <input type="text" value="miner_001" readonly>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" value="miner@example.com">
            </div>
            <div class="form-group">
                <label>Wallet Address</label>
                <input type="text" value="grin1qw..." readonly>
            </div>
            <button class="btn-save">Save Profile</button>
        </div>

        <div class="settings-section">
            <h3>Mining Settings</h3>
            <div class="form-group">
                <label>Preferred Pool Server</label>
                <select>
                    <option>US East (Default)</option>
                    <option>US West</option>
                    <option>Europe</option>
                    <option>Asia Pacific</option>
                </select>
            </div>
            <div class="form-group">
                <label>Minimum Payout Amount (GRIN)</label>
                <input type="number" value="10" min="1">
            </div>
            <div class="form-group">
                <label>Auto-Reinvest Rewards</label>
                <select>
                    <option>Disabled</option>
                    <option>50% Reinvest</option>
                    <option>100% Reinvest</option>
                </select>
            </div>
            <button class="btn-save">Save Mining Settings</button>
        </div>

        <div class="settings-section">
            <h3>Security Settings</h3>
            <div class="form-group">
                <label>Current Password</label>
                <input type="password" placeholder="Enter current password">
            </div>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" placeholder="Enter new password">
            </div>
            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" placeholder="Confirm new password">
            </div>
            <button class="btn-save">Change Password</button>
        </div>

        <div class="settings-section">
            <h3>Two-Factor Authentication</h3>
            <div class="form-group">
                <label style="margin-bottom: 15px;">2FA Status: Disabled</label>
                <button class="btn-save">Enable 2FA</button>
            </div>
        </div>

        <div class="settings-section">
            <h3>API Keys</h3>
            <div class="form-group">
                <label>API Key (Read-Only)</label>
                <input type="text" value="grinium_api_key_12345..." readonly>
            </div>
            <button class="btn-save">Regenerate API Key</button>
        </div>

        <div class="settings-section">
            <h3>Preferences</h3>
            <div class="form-group">
                <label>Theme Preference</label>
                <select>
                    <option>System Default</option>
                    <option>Dark</option>
                    <option>Light</option>
                    <option>Atomic</option>
                </select>
            </div>
            <div class="form-group">
                <label>Email Notifications</label>
                <select>
                    <option>All Events</option>
                    <option>Important Only</option>
                    <option>Disabled</option>
                </select>
            </div>
            <button class="btn-save">Save Preferences</button>
        </div>
    </div>

    <footer>
        <p>Account Settings — Mining Pool User Management | Professional • Reliable • Secure</p>
    </footer>

    <script>
        const themeButtons = document.querySelectorAll('.theme-btn');
        const savedTheme = localStorage.getItem('grinium-theme') || 'dark';

        setTheme(savedTheme);

        themeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                const theme = btn.dataset.theme;
                setTheme(theme);
                localStorage.setItem('grinium-theme', theme);
            });
        });

        function setTheme(theme) {
            document.body.className = '';
            if (theme === 'light') {
                document.body.classList.add('light-theme');
            } else if (theme === 'atomic') {
                document.body.classList.add('atomic-theme');
            }

            themeButtons.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.theme === theme);
            });
        }
    </script>
</body>
</html>
