<!DOCTYPE html>
<html lang="en" data-page="connect">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect &amp; Start Mining</title>
  <style>
    :root {
      --bg-body: #0f1419; --bg-card: #1a1f29; --bg-card2: #252d3d; --text: #e0e0e0;
      --text-dim: #a0aec0; --accent: #667eea; --border-color: #2d3748;
      --btn-bg: #667eea; --btn-text: #fff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg-body); color: var(--text);
      font-family: var(--brand-font, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif);
      line-height: 1.6;
    }
    .topbar {
      padding: 1rem 1.5rem; border-bottom: 1px solid var(--border-color);
    }
    .topbar a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .wrap { max-width: 900px; margin: 0 auto; padding: 2.5rem 1.5rem; }
    h1 { font-size: 2rem; margin-top: 0; }
    h2 { color: var(--accent); margin-top: 2.5rem; }
    .summary {
      background: var(--bg-card); border: 1px solid var(--border-color);
      border-radius: 8px; padding: 1.25rem; margin: 1.5rem 0;
      display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem;
    }
    .summary .label { color: var(--text-dim); font-size: 0.85rem; }
    .summary .value { font-weight: 600; font-size: 1.05rem; word-break: break-all; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; margin: 1rem 0; }
    @media (max-width: 640px) { .form-row { grid-template-columns: 1fr; } }
    label { display: block; font-weight: 600; margin-bottom: 0.4rem; }
    input[type="text"] {
      width: 100%; padding: 0.7rem; border: 1px solid var(--border-color);
      background: var(--bg-card2); color: var(--text); border-radius: 4px; font-size: 1rem;
    }
    .cmd {
      position: relative; background: var(--bg-card2); border: 1px solid var(--border-color);
      border-radius: 6px; padding: 1rem 3rem 1rem 1rem; margin: 0.75rem 0;
      font-family: 'SF Mono', 'Cascadia Code', Consolas, monospace; font-size: 0.9rem;
      white-space: pre-wrap; word-break: break-all;
    }
    .copy-btn {
      position: absolute; top: 0.6rem; right: 0.6rem; padding: 0.35rem 0.7rem;
      background: var(--btn-bg); color: var(--btn-text); border: none; border-radius: 4px;
      cursor: pointer; font-size: 0.8rem; font-weight: 600;
    }
    .miner { margin-top: 1.5rem; }
    .miner h3 { margin-bottom: 0.25rem; }
    .hint { color: var(--text-dim); font-size: 0.9rem; }
    footer {
      padding: 2rem 1.5rem; text-align: center; color: var(--text-dim);
      border-top: 1px solid var(--border-color); font-size: 0.9rem;
    }
    footer [data-brand="page-links"] a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="/">&larr; <span data-brand="pool_name">Home</span></a>
  </div>

  <div class="wrap">
    <h1>Connect &amp; Start Mining</h1>
    <p class="hint">Enter your Grin address and a worker name, then copy a command for your miner.</p>

    <div class="summary">
      <div><div class="label">Stratum host</div><div class="value" data-brand="stratum_host">—</div></div>
      <div><div class="label">Port</div><div class="value" data-brand="stratum_port">—</div></div>
      <div><div class="label">Network</div><div class="value" data-brand="network">—</div></div>
      <div><div class="label">Algorithm</div><div class="value" data-brand="algorithm">Cuckatoo32</div></div>
    </div>

    <div class="form-row">
      <div>
        <label for="addr">Your Grin Address</label>
        <input type="text" id="addr" placeholder="grin1..." oninput="renderCommands()">
      </div>
      <div>
        <label for="worker">Worker Name</label>
        <input type="text" id="worker" value="rig1" oninput="renderCommands()">
      </div>
    </div>
    <p class="hint">Your stratum username is <code><span id="user-preview">grin1….rig1</span></code> — no registration needed.</p>

    <h2>Miner commands</h2>
    <div id="miners"></div>
  </div>

  <footer>
    <p data-brand="footer_text"></p>
    <div data-brand="page-links"></div>
    <p data-brand="attribution">Powered by the Grin Node Toolkit</p>
  </footer>

  <script>
    var CONN = { stratum_host: '', stratum_port: '', network: 'mainnet', algorithm: 'Cuckatoo32' };

    // Miner command templates. {URL}=host:port {HOST} {PORT} {USER}=address.worker
    var MINERS = [
      { name: 'lolMiner', tpl: 'lolMiner --algo C32 --pool {URL} --user {USER}' },
      { name: 'GMiner',   tpl: 'miner --algo grin32 --server {HOST} --port {PORT} --user {USER}' },
      { name: 'SRBMiner-MULTI', tpl: 'SRBMiner-MULTI --algorithm grin_cuckatoo32 --pool {URL} --wallet {USER}' }
    ];

    function currentUser() {
      var addr = (document.getElementById('addr').value || 'grin1…').trim();
      var worker = (document.getElementById('worker').value || 'rig1').trim().replace(/\s+/g, '_');
      return addr + '.' + worker;
    }

    function renderCommands() {
      var user = currentUser();
      document.getElementById('user-preview').textContent = user;
      var host = CONN.stratum_host || 'your-pool-host';
      var port = CONN.stratum_port || '3333';
      var url = host + ':' + port;

      var html = '';
      MINERS.forEach(function (m, i) {
        var cmd = m.tpl.replace(/{URL}/g, url).replace(/{HOST}/g, host)
                       .replace(/{PORT}/g, port).replace(/{USER}/g, user);
        html += '<div class="miner"><h3>' + m.name + '</h3>' +
                '<div class="cmd"><button class="copy-btn" onclick="copyCmd(' + i + ')">Copy</button>' +
                '<span id="cmd-' + i + '">' + escapeHtml(cmd) + '</span></div></div>';
      });
      document.getElementById('miners').innerHTML = html;
    }

    function copyCmd(i) {
      var text = document.getElementById('cmd-' + i).textContent;
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(flash.bind(null, i));
      } else {
        var ta = document.createElement('textarea');
        ta.value = text; document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); } catch (e) {}
        ta.remove(); flash(i);
      }
    }

    function flash(i) {
      var btn = document.querySelectorAll('.copy-btn')[i];
      if (!btn) return;
      var orig = btn.textContent; btn.textContent = 'Copied!';
      setTimeout(function () { btn.textContent = orig; }, 1500);
    }

    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // Pull connection details from the public branding endpoint.
    fetch('/api/public/branding')
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (json) {
        if (json && json.data && json.data.connection) CONN = json.data.connection;
        renderCommands();
      })
      .catch(renderCommands);

    renderCommands();
  </script>
  <script src="/js/branding.js"></script>
</body>
</html>
