<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment History — Mining Pool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --dark-bg: #080b07;
            --dark-card: #11160d;
            --dark-text: #e8f5cf;
            --dark-dim: #9db077;
            --neon-cyan: #b8e600;
            --neon-magenta: #00f7ff;
            --neon-lime: #d4ff3d;
        }

        body {
            background-color: var(--dark-bg);
            background-image:
                linear-gradient(0deg, transparent 24%, rgba(184, 230, 0, 0.05) 25%, rgba(184, 230, 0, 0.05) 26%, transparent 27%, transparent 74%, rgba(184, 230, 0, 0.05) 75%, rgba(184, 230, 0, 0.05) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(184, 230, 0, 0.05) 25%, rgba(184, 230, 0, 0.05) 26%, transparent 27%, transparent 74%, rgba(184, 230, 0, 0.05) 75%, rgba(184, 230, 0, 0.05) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            color: var(--dark-text);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes neon-glow {
            0%, 100% { text-shadow: 0 0 5px var(--neon-cyan), 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan); }
            50% { text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan), 0 0 30px var(--neon-cyan), 0 0 40px var(--neon-cyan); }
        }


        @keyframes scanlines {
            0% { transform: translateY(0); }
            100% { transform: translateY(10px); }
        }


        @keyframes border-glow {
            0%, 100% { border-color: var(--neon-cyan); box-shadow: 0 0 5px var(--neon-cyan), inset 0 0 5px rgba(184, 230, 0, 0.1); }
            50% { border-color: var(--neon-magenta); box-shadow: 0 0 10px var(--neon-magenta), inset 0 0 5px rgba(0, 247, 255, 0.1); }
        }



        .theme-switcher {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            gap: 4px;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 6px 8px;
            border-radius: 50px;
            border: 1px solid var(--neon-cyan);
            box-shadow: 0 0 15px var(--neon-cyan);
            transition: all 0.3s ease;
        }



        header {
            background: linear-gradient(135deg, rgba(184, 230, 0, 0.1), rgba(0, 247, 255, 0.1));
            border-bottom: 2px solid var(--neon-cyan);
            padding: 16px 20px;
            position: relative;
            overflow: hidden;
            transition: all 0.6s ease;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(184, 230, 0, 0.03) 2px,
                rgba(184, 230, 0, 0.03) 4px
            );
            pointer-events: none;
            animation: scanlines 8s linear infinite;
        }

        .header-content {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 1.4em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            animation: neon-glow 2s ease-in-out infinite;
            transition: all 0.6s ease;
        }

        .header-nav {
            display: flex;
            gap: 8px;
            list-style: none;
            flex: 1;
            margin: 0;
            padding: 0;
        }

        .nav-link {
            display: inline-block;
            color: var(--dark-text);
            text-decoration: none;
            padding: 8px 14px;
            font-size: 0.75em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            border-radius: 4px;
            background: rgba(184, 230, 0, 0.1);
            border: 1px solid rgba(184, 230, 0, 0.2);
        }

        .nav-link:hover {
            background: rgba(184, 230, 0, 0.2);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(184, 230, 0, 0.3);
        }

        .nav-link.active {
            background: rgba(184, 230, 0, 0.2);
            border-color: var(--neon-cyan);
        }

        .header-buttons {
            display: flex;
            gap: 8px;
        }

        .header-btn {
            background: rgba(184, 230, 0, 0.1);
            color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan);
            padding: 8px 14px;
            border-radius: 4px;
            font-size: 0.7em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
            box-shadow: 0 0 8px rgba(184, 230, 0, 0.2);
        }

        .header-btn:hover {
            background: rgba(184, 230, 0, 0.2);
            border-color: var(--neon-magenta);
            box-shadow: 0 0 15px rgba(184, 230, 0, 0.4);
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .page-title {
            font-size: 2.2em;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: neon-glow 2s ease-in-out infinite;
            margin-bottom: 30px;
            transition: all 0.6s ease;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(17, 22, 13, 0.5);
            border: 2px solid var(--neon-cyan);
            padding: 28px;
            border-radius: 0;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: border-glow 3s ease-in-out infinite;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-8px);
            border-color: var(--neon-magenta);
            box-shadow: 0 0 30px var(--neon-magenta);
        }

        .stat-card:hover::before {
            opacity: 1;
        }

        .stat-label {
            color: var(--neon-lime);
            font-size: 0.7em;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.6s ease;
        }

        .stat-label::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--neon-lime);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--neon-lime);
        }

        .stat-value {
            font-size: 2.2em;
            color: var(--neon-cyan);
            font-weight: bold;
            text-shadow: 0 0 10px var(--neon-cyan);
            margin-bottom: 10px;
            transition: all 0.6s ease;
        }

        .section-title {
            font-size: 1.6em;
            color: var(--neon-cyan);
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-bottom: 2px solid var(--neon-magenta);
            padding-bottom: 12px;
            transition: all 0.6s ease;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 40px;
        }

        .data-table thead {
            background: rgba(184, 230, 0, 0.1);
            border-bottom: 2px solid var(--neon-cyan);
        }

        .data-table th {
            padding: 14px;
            text-align: left;
            color: var(--neon-cyan);
            font-weight: bold;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .data-table td {
            padding: 14px;
            border-bottom: 1px solid rgba(184, 230, 0, 0.1);
            color: var(--dark-dim);
        }

        .data-table tbody tr:hover {
            background: rgba(184, 230, 0, 0.05);
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(0, 255, 0, 0.2);
            color: var(--neon-lime);
            border: 1px solid var(--neon-lime);
        }

        .badge.completed {
            background: rgba(0, 255, 0, 0.2);
            color: var(--neon-lime);
            border-color: var(--neon-lime);
        }

        .badge.pending {
            background: rgba(255, 200, 0, 0.2);
            color: #ffc800;
            border-color: #ffc800;
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            border-top: 2px solid rgba(184, 230, 0, 0.2);
            color: #666;
            font-size: 0.9em;
        }

        @media (max-width: 1024px) {
            .header-nav {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .page-title {
                font-size: 1.6em;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .data-table {
                font-size: 0.85em;
            }

            .data-table th,
            .data-table td {
                padding: 10px;
            }
        }
    </style>
    <link rel="stylesheet" href="/css/themes.css">
</head>
<body>
    <div class="theme-switcher"></div>

    <header>
        <div class="header-content">
            <h1>⚛ GRINIUM</h1>
            <nav class="header-nav">
                <a href="index.html" class="nav-link">Home</a>
                <a href="admin-dashboard.html" class="nav-link">Admin</a>
                <a href="miners-stats.html" class="nav-link">Miners</a>
                <a href="payment-history.html" class="nav-link active">Payouts</a>
                <a href="pool-info.html" class="nav-link">Info</a>
            </nav>
            <div class="header-buttons">
                <a href="account-settings.html" class="header-btn">My Account</a>
                <a href="connect.html" class="header-btn">Start Mining</a>
            </div>
        </div>
    </header>

    <div class="container">
        <h2 class="page-title">Payment History</h2>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Paid Out (7 days)</div>
                <div class="stat-value" id="ph-paid-7d">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Last Payout</div>
                <div class="stat-value" id="ph-last">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Payouts (7 days)</div>
                <div class="stat-value" id="ph-count-7d">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Avg Payout</div>
                <div class="stat-value" id="ph-avg">—</div>
            </div>
        </div>

        <h3 class="section-title">Recent Payouts</h3>

        <table class="data-table">
            <thead>
                <tr>
                    <th>Date & Time</th>
                    <th>Miner</th>
                    <th>Amount</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="payouts">
                <tr><td colspan="4">Loading…</td></tr>
            </tbody>
        </table>
    </div>

    <footer>
        <p>Payment History — Mining Pool Transactions | Professional • Reliable • Secure</p>
    </footer>

    <script src="/js/auth.js"></script>
    <script>
        // Escape any value before it goes into innerHTML (defense-in-depth on tx_hash,
        // status, and any operator/miner-derived field rendered into the table).
        function escHtml(v) {
            return String(v == null ? '' : v)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        // Theme switching is handled site-wide by /js/public-theme.js, which renders
        // the theme picker and applies the 3 built-in + 10 white-label themes.

        // ═════════════════════════════════════════════════════════════════
        // API Integration: confirmed payouts from the PUBLIC endpoint
        // (/api/pool/payments — withdrawals table, status='confirmed').
        // Timestamps are unixepoch SECONDS → multiply by 1000 for Date.
        // ═════════════════════════════════════════════════════════════════

        function truncAddr(addr) {
            addr = String(addr || '');
            return addr.length > 16 ? addr.slice(0, 9) + '…' + addr.slice(-4) : addr;
        }

        function setStat(id, text) {
            const el = document.getElementById(id);
            if (el) el.textContent = text;
        }

        async function loadPaymentHistory() {
            const tbody = document.getElementById('payouts');
            try {
                const data = await Auth.fetch('/api/pool/payments?limit=100');
                if (!Array.isArray(data)) throw new Error('bad response');

                const now = Math.floor(Date.now() / 1000);
                const when = w => w.confirmed_at || w.created_at || 0;
                const last7d = data.filter(w => when(w) > now - 7 * 86400);
                const sum = arr => arr.reduce((s, w) => s + (w.amount || 0), 0);

                setStat('ph-paid-7d', sum(last7d).toFixed(2) + ' GRIN');
                setStat('ph-count-7d', last7d.length);
                setStat('ph-last', data.length ? new Date(when(data[0]) * 1000).toLocaleString() : 'No payouts yet');
                setStat('ph-avg', data.length ? (sum(data) / data.length).toFixed(2) + ' GRIN' : '—');

                if (tbody) {
                    if (!data.length) {
                        tbody.innerHTML = '<tr><td colspan="4">No payouts yet</td></tr>';
                    } else {
                        tbody.innerHTML = data.slice(0, 25).map(w => `
                            <tr>
                                <td>${escHtml(new Date(when(w) * 1000).toLocaleString())}</td>
                                <td title="${escHtml(w.grin_address)}">${escHtml(truncAddr(w.grin_address))}</td>
                                <td>${Number(w.amount || 0).toFixed(2)} GRIN</td>
                                <td><span class="status-badge status-active">confirmed</span></td>
                            </tr>
                        `).join('');
                    }
                }
            } catch (error) {
                if (tbody) tbody.innerHTML = '<tr><td colspan="4">Payment data unavailable</td></tr>';
            }
        }

        // Load on page ready
        document.addEventListener('DOMContentLoaded', loadPaymentHistory);

        // Refresh every 60 seconds
        setInterval(loadPaymentHistory, 60000);
    </script>
    <script src="/js/public-theme.js"></script>
    <script src="/js/branding.js"></script>
</body>
</html>
