<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payments | Grin Pool ツ</title>
  <link rel="stylesheet" href="/css/pool.css">
  <link rel="stylesheet" href="/admin/styles.css">
</head>
<body>

<main>
  <div class="container">
    <section>
      <h2>
        Payments
        <span id="queue-summary" style="font-size:.82rem;color:var(--text-dim);font-weight:400;margin-left:.8rem;"></span>
      </h2>

      <!-- Queue controls + export -->
      <div style="display:flex;gap:.5rem;align-items:center;margin-bottom:.8rem;flex-wrap:wrap;">
        <div class="tabs" id="filter-chips" style="margin:0;">
          <button class="tab-btn active" data-filter="all"             onclick="setFilter('all', this)">All</button>
          <button class="tab-btn"        data-filter="active"          onclick="setFilter('active', this)">Active</button>
          <button class="tab-btn"        data-filter="retry_scheduled" onclick="setFilter('retry_scheduled', this)">Retry queued</button>
          <button class="tab-btn"        data-filter="tor_failed"      onclick="setFilter('tor_failed', this)">Stuck / Failed</button>
          <button class="tab-btn"        data-filter="confirmed"       onclick="setFilter('confirmed', this)">Paid</button>
          <button class="tab-btn"        data-filter="cancelled"       onclick="setFilter('cancelled', this)">Cancelled</button>
        </div>
        <span style="flex:1 1 auto;"></span>
        <a class="btn btn-sm btn-outline" href="/api/admin/export/payouts.csv">⤓ Payouts CSV</a>
        <a class="btn btn-sm btn-outline" href="/api/admin/export/fee-revenue.csv">⤓ Fee-revenue CSV</a>
      </div>

      <div class="card" style="padding:0;">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Address</th>
                <th>Amount ツ</th>
                <th>Status</th>
                <th>Retries</th>
                <th>Created</th>
                <th>Confirmed</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="pay-tbody">
              <tr class="loading-row"><td colspan="8"><span class="spinner"></span>Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
      <p class="error-msg" id="pay-msg" style="display:none;margin-top:.6rem;"></p>
    </section>
  </div>
</main>

<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/admin/admin-shell.js"></script>
<script src="/js/stepup.js"></script>
<script>
let _withdrawals = [];
let _filter = 'all';

// Auth gate (httpOnly-cookie aware): redirects to /login.html if not an admin, else wires
// up the topbar username + Logout. Pool name + testnet banner are handled by admin-shell.js.
// stepup.js provides adminFetch() for the step-up-gated retry/cancel actions.
API.guardAdminPage();

function escHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtGrin(v) { return (Number(v) || 0).toFixed(4); }
function fmtTs(t)   { return t ? new Date(t * 1000).toLocaleString() : '—'; }
function shortAddr(a) {
  a = String(a || '');
  return a.length > 18 ? a.slice(0, 10) + '…' + a.slice(-6) : a;
}

const STATUS = {
  tor_checking:    ['badge-warn',  'Checking (Tor)'],
  tor_sending:     ['badge-warn',  'Sending'],
  retry_scheduled: ['badge-warn',  'Retry scheduled'],
  confirmed:       ['badge-ok',    'Paid'],
  tor_failed:      ['badge-error', 'Failed'],
  cancelled:       ['badge-dim',   'Cancelled'],
};
const ACTIVE = ['tor_checking', 'tor_sending', 'retry_scheduled'];

function matchesFilter(w) {
  if (_filter === 'all') return true;
  if (_filter === 'active') return ACTIVE.includes(w.status);
  return w.status === _filter;
}

async function loadQueueSummary() {
  try {
    const s = await API.get('/api/admin/withdrawal-scheduler');
    document.getElementById('queue-summary').textContent =
      `${s.pending || 0} pending · ${s.failed || 0} failed · ${fmtGrin(s.total_paid_24h)} ツ paid (24h)`;
  } catch (e) {}
}

async function loadWithdrawals() {
  const tbody = document.getElementById('pay-tbody');
  try {
    const items = await API.get('/api/admin/withdrawals');
    _withdrawals = Array.isArray(items) ? items : [];
    render();
  } catch (err) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="8">Error: ${escHtml(err.message)}</td></tr>`;
  }
}

function render() {
  const tbody = document.getElementById('pay-tbody');
  const rows = _withdrawals.filter(matchesFilter);
  if (!rows.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="8">No withdrawals in this view.</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(w => {
    const [cls, label] = STATUS[w.status] || ['badge-dim', w.status];
    const canRetry  = w.status === 'retry_scheduled' || w.status === 'tor_failed';
    const canCancel = w.status === 'retry_scheduled' || w.status === 'tor_checking' || w.status === 'tor_failed';
    let actions = '';
    if (canRetry)  actions += `<button class="btn btn-sm" onclick="retryWithdrawal(${w.id})">Retry now</button> `;
    if (canCancel) actions += `<button class="btn btn-sm btn-outline" onclick="cancelWithdrawal(${w.id}, ${fmtGrin(w.amount)})">Cancel</button>`;
    if (!actions)  actions = '<span style="color:var(--text-dim)">—</span>';
    const reason = w.cancel_reason ? ` title="${escHtml(w.cancel_reason)}"` : '';
    return `<tr>
      <td class="mono">${w.id}</td>
      <td><span class="mono" title="${escHtml(w.grin_address)}">${escHtml(shortAddr(w.grin_address))}</span></td>
      <td class="mono">${fmtGrin(w.amount)}</td>
      <td><span class="badge ${cls}"${reason}>${escHtml(label)}</span></td>
      <td class="mono">${w.retry_count != null ? w.retry_count : 0}</td>
      <td>${fmtTs(w.created_at)}</td>
      <td>${fmtTs(w.confirmed_at)}</td>
      <td>${actions}</td>
    </tr>`;
  }).join('');
}

function setFilter(f, btn) {
  _filter = f;
  document.querySelectorAll('#filter-chips .tab-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  render();
}

function flash(msg, isErr) {
  const el = document.getElementById('pay-msg');
  el.textContent = msg;
  el.className = isErr ? 'error-msg' : 'success-msg';
  el.style.display = '';
  setTimeout(() => { el.style.display = 'none'; }, 5000);
}

async function retryWithdrawal(id) {
  if (!confirm(`Force withdrawal #${id} back into the send queue now?`)) return;
  try {
    const res = await adminFetch('/api/admin/withdrawals/' + id + '/retry', { method: 'POST' });
    const body = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(body.error || ('HTTP ' + res.status));
    flash(`Withdrawal #${id} re-queued.`, false);
    refresh();
  } catch (err) { flash(err.message, true); }
}

async function cancelWithdrawal(id, amount) {
  const reason = prompt(`Cancel withdrawal #${id} (${amount} ツ) and refund the miner's balance?\n\nOptional reason:`);
  if (reason === null) return;
  try {
    const res = await adminFetch('/api/admin/withdrawals/' + id + '/cancel', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ reason })
    });
    const body = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(body.error || ('HTTP ' + res.status));
    flash(`Withdrawal #${id} cancelled${body.refunded ? ' and refunded' : ''}.`, false);
    refresh();
  } catch (err) { flash(err.message, true); }
}

function refresh() { loadQueueSummary(); loadWithdrawals(); }

document.addEventListener('DOMContentLoaded', refresh);
setInterval(refresh, 30000);
</script>
</body>
</html>
