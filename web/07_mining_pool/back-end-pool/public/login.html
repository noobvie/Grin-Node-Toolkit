<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Admin login for Grin Mining Pool">
  <title>Admin Login - Grin Mining Pool</title>
  <link rel="stylesheet" href="/css/pool.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-container {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo p {
      color: var(--text-muted);
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: var(--text-primary);
      font-size: 0.95rem;
    }

    input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(102, 126, 234, 0.05);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 0.95rem;
      transition: all 0.2s ease;
    }

    input::placeholder {
      color: var(--text-muted);
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    button {
      width: 100%;
      padding: 0.875rem;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error {
      background: rgba(245, 101, 101, 0.1);
      color: var(--danger);
      padding: 1rem;
      border-radius: 6px;
      border-left: 4px solid var(--danger);
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
      display: none;
    }

    .success {
      background: rgba(72, 187, 120, 0.1);
      color: var(--success);
      padding: 1rem;
      border-radius: 6px;
      border-left: 4px solid var(--success);
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
      display: none;
    }

    .register-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.95rem;
      color: var(--text-secondary);
    }

    .register-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .register-link a:hover {
      opacity: 0.8;
      text-decoration: underline;
    }

    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(102, 126, 234, 0.2);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 0.5rem;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 1.5rem;
      }

      .logo h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <h1>⛏ Grin Pool</h1>
      <p>Mining Pool Admin</p>
    </div>

    <div class="error" id="error-msg"></div>
    <div class="success" id="success-msg"></div>

    <div id="login-form">
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" id="login-btn">Login</button>
      </form>
      <div class="register-link">
        New admin? <a href="#" onclick="toggleRegister(event)">Register here</a>
      </div>
    </div>

    <div id="register-form" style="display: none;">
      <form onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="reg-username">Username</label>
          <input type="text" id="reg-username" name="username" required>
        </div>
        <div class="form-group">
          <label for="reg-password">Password (min 8 chars)</label>
          <input type="password" id="reg-password" name="password" required>
        </div>
        <button type="submit" id="register-btn">Create Admin Account</button>
      </form>
      <div class="register-link">
        Already have account? <a href="#" onclick="toggleRegister(event)">Login</a>
      </div>
    </div>
  </div>

  <script>
    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 5000);
    }

    function showSuccess(msg) {
      const el = document.getElementById('success-msg');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 5000);
    }

    function toggleRegister(e) {
      e.preventDefault();
      document.getElementById('login-form').style.display =
        document.getElementById('login-form').style.display === 'none' ? 'block' : 'none';
      document.getElementById('register-form').style.display =
        document.getElementById('register-form').style.display === 'none' ? 'block' : 'none';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');

      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span>Logging in...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (data.success) {
          localStorage.setItem('access_token', data.access_token);
          localStorage.setItem('refresh_token', data.refresh_token);
          window.location.href = '/admin.html';
        } else {
          showError(data.error || 'Login failed');
        }
      } catch (err) {
        showError('Connection error: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Login';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const username = document.getElementById('reg-username').value;
      const password = document.getElementById('reg-password').value;
      const btn = document.getElementById('register-btn');

      if (username.length < 3) {
        showError('Username must be at least 3 characters');
        return;
      }

      if (password.length < 8) {
        showError('Password must be at least 8 characters');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span>Creating...';

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (data.success) {
          showSuccess('Admin account created! Logging in...');
          setTimeout(() => {
            document.getElementById('username').value = username;
            document.getElementById('password').value = password;
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('register-form').style.display = 'none';
            handleLogin(new Event('submit'));
          }, 1000);
        } else {
          showError(data.error || 'Registration failed');
        }
      } catch (err) {
        showError('Connection error: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Create Admin Account';
      }
    }

    if (localStorage.getItem('access_token')) {
      window.location.href = '/admin.html';
    }
  </script>
</body>
</html>
