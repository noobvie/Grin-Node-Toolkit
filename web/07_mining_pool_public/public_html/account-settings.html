<!DOCTYPE html>
<html lang="en" data-page="account-settings" data-maintenance="exempt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings — Mining Pool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --dark-bg: #080b07;
            --dark-card: #11160d;
            --dark-text: #e8f5cf;
            --dark-dim: #9db077;
            --neon-cyan: #b8e600;
            --neon-magenta: #00f7ff;
            --neon-lime: #d4ff3d;
        }

        body {
            background-color: var(--dark-bg);
            background-image:
                linear-gradient(0deg, transparent 24%, rgba(184, 230, 0, 0.05) 25%, rgba(184, 230, 0, 0.05) 26%, transparent 27%, transparent 74%, rgba(184, 230, 0, 0.05) 75%, rgba(184, 230, 0, 0.05) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(184, 230, 0, 0.05) 25%, rgba(184, 230, 0, 0.05) 26%, transparent 27%, transparent 74%, rgba(184, 230, 0, 0.05) 75%, rgba(184, 230, 0, 0.05) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            color: var(--dark-text);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes neon-glow {
            0%, 100% { text-shadow: 0 0 5px var(--neon-cyan), 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan); }
            50% { text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan), 0 0 30px var(--neon-cyan), 0 0 40px var(--neon-cyan); }
        }


        @keyframes scanlines {
            0% { transform: translateY(0); }
            100% { transform: translateY(10px); }
        }


        @keyframes border-glow {
            0%, 100% { border-color: var(--neon-cyan); box-shadow: 0 0 5px var(--neon-cyan), inset 0 0 5px rgba(184, 230, 0, 0.1); }
            50% { border-color: var(--neon-magenta); box-shadow: 0 0 10px var(--neon-magenta), inset 0 0 5px rgba(0, 247, 255, 0.1); }
        }



        .theme-switcher {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            gap: 4px;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 6px 8px;
            border-radius: 50px;
            border: 1px solid var(--neon-cyan);
            box-shadow: 0 0 15px var(--neon-cyan);
            transition: all 0.3s ease;
        }



        header {
            background: linear-gradient(135deg, rgba(184, 230, 0, 0.1), rgba(0, 247, 255, 0.1));
            border-bottom: 2px solid var(--neon-cyan);
            padding: 16px 20px;
            position: relative;
            overflow: hidden;
            transition: all 0.6s ease;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(184, 230, 0, 0.03) 2px,
                rgba(184, 230, 0, 0.03) 4px
            );
            pointer-events: none;
            animation: scanlines 8s linear infinite;
        }

        .header-content {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 1.4em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            animation: neon-glow 2s ease-in-out infinite;
            transition: all 0.6s ease;
        }

        .header-nav {
            display: flex;
            gap: 8px;
            list-style: none;
            flex: 1;
            margin: 0;
            padding: 0;
        }

        .nav-link {
            display: inline-block;
            color: var(--dark-text);
            text-decoration: none;
            padding: 8px 14px;
            font-size: 0.75em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            border-radius: 4px;
            background: rgba(184, 230, 0, 0.1);
            border: 1px solid rgba(184, 230, 0, 0.2);
        }

        .nav-link:hover {
            background: rgba(184, 230, 0, 0.2);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(184, 230, 0, 0.3);
        }

        .nav-link.active {
            background: rgba(184, 230, 0, 0.2);
            border-color: var(--neon-cyan);
        }

        .header-buttons {
            display: flex;
            gap: 8px;
        }

        .header-btn {
            background: rgba(184, 230, 0, 0.1);
            color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan);
            padding: 8px 14px;
            border-radius: 4px;
            font-size: 0.7em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
            box-shadow: 0 0 8px rgba(184, 230, 0, 0.2);
        }

        .header-btn:hover {
            background: rgba(184, 230, 0, 0.2);
            border-color: var(--neon-magenta);
            box-shadow: 0 0 15px rgba(184, 230, 0, 0.4);
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .page-title {
            font-size: 2.2em;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: neon-glow 2s ease-in-out infinite;
            margin-bottom: 40px;
            transition: all 0.6s ease;
        }

        .settings-section {
            background: rgba(17, 22, 13, 0.3);
            border: 2px solid rgba(184, 230, 0, 0.2);
            padding: 30px;
            margin-bottom: 30px;
            border-radius: 8px;
        }

        .settings-section h3 {
            font-size: 1.2em;
            color: var(--neon-cyan);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9em;
            font-weight: bold;
            color: var(--neon-lime);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid rgba(184, 230, 0, 0.3);
            background: rgba(0, 0, 0, 0.2);
            color: var(--dark-text);
            border-radius: 4px;
            font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
            font-size: 0.9em;
        }

        .btn-save {
            padding: 10px 28px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
            color: var(--dark-bg);
            border: none;
            border-radius: 4px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(184, 230, 0, 0.3);
        }

        .btn-save:hover {
            box-shadow: 0 0 25px rgba(184, 230, 0, 0.5);
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            border-top: 2px solid rgba(184, 230, 0, 0.2);
            color: #666;
            font-size: 0.9em;
        }

        @media (max-width: 1024px) {
            .header-nav {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .page-title {
                font-size: 1.6em;
            }

            .settings-section {
                padding: 20px;
            }
        }
    </style>
    <link rel="stylesheet" href="/css/themes.css">
</head>
<body>
    <div class="theme-switcher"></div>

    <header>
        <div class="header-content">
            <h1>⚛ GRINIUM</h1>
            <nav class="header-nav">
                <a href="index.html" class="nav-link">Home</a>
                <a href="admin-dashboard.html" class="nav-link">Admin</a>
                <a href="miners-stats.html" class="nav-link">Miners</a>
                <a href="payment-history.html" class="nav-link">Payouts</a>
                <a href="pool-info.html" class="nav-link">Info</a>
            </nav>
            <div class="header-buttons">
                <button class="header-btn">Profile</button>
                <button class="header-btn">Logout</button>
            </div>

    </header>

    <div class="container">
        <h2 class="page-title">Account Settings</h2>

        <div class="settings-section">
            <h3>Profile Information</h3>
            <div class="form-group">
                <label>Username</label>
                <input type="text" value="miner_001" readonly>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" value="miner@example.com">
            </div>
            <div class="form-group">
                <label>Wallet Address</label>
                <input type="text" value="grin1qw..." readonly>
            </div>
            <button class="btn-save">Save Profile</button>
        </div>

        <div class="settings-section">
            <h3>Mining Settings</h3>
            <div class="form-group">
                <label>Preferred Pool Server</label>
                <select>
                    <option>US East (Default)</option>
                    <option>US West</option>
                    <option>Europe</option>
                    <option>Asia Pacific</option>
                </select>
            </div>
            <div class="form-group">
                <label>Minimum Payout Amount (GRIN)</label>
                <input type="number" value="10" min="1">
            </div>
            <div class="form-group">
                <label>Auto-Reinvest Rewards</label>
                <select>
                    <option>Disabled</option>
                    <option>50% Reinvest</option>
                    <option>100% Reinvest</option>
                </select>
            </div>
            <button class="btn-save">Save Mining Settings</button>
        </div>

        <div class="settings-section">
            <h3>Security Settings</h3>
            <div class="form-group">
                <label>Current Password</label>
                <input type="password" placeholder="Enter current password">
            </div>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" placeholder="Enter new password">
            </div>
            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" placeholder="Confirm new password">
            </div>
            <button class="btn-save">Change Password</button>
        </div>

        <div class="settings-section">
            <h3>Two-Factor Authentication</h3>
            <div class="form-group">
                <label style="margin-bottom: 15px;">2FA Status: Disabled</label>
                <button class="btn-save">Enable 2FA</button>
            </div>
        </div>

        <div class="settings-section">
            <h3>API Keys</h3>
            <div class="form-group">
                <label>API Key (Read-Only)</label>
                <input type="text" value="grinium_api_key_12345..." readonly>
            </div>
            <button class="btn-save">Regenerate API Key</button>
        </div>

        <div class="settings-section">
            <h3>Preferences</h3>
            <div class="form-group">
                <label>Theme Preference</label>
                <select>
                    <option>System Default</option>
                    <option>Dark</option>
                    <option>Light</option>
                    <option>Atomic</option>
                </select>
            </div>
            <div class="form-group">
                <label>Email Notifications</label>
                <select>
                    <option>All Events</option>
                    <option>Important Only</option>
                    <option>Disabled</option>
                </select>
            </div>
            <button class="btn-save">Save Preferences</button>
        </div>
    </div>

    <footer>
        <p>Account Settings — Mining Pool User Management | Professional • Reliable • Secure</p>
    </footer>

    <script src="/js/auth.js"></script>
    <script>
        // Theme switching is handled site-wide by /js/public-theme.js, which renders
        // the theme picker and applies the 3 built-in + 10 white-label themes.

        // ═════════════════════════════════════════════════════════════════
        // API Integration: Account settings form handlers
        // ═════════════════════════════════════════════════════════════════

        function initAccountSettings() {
            requireAuth(); // Redirect if not logged in

            // Add click handlers to all Save buttons
            document.querySelectorAll('.btn-save').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.preventDefault();

                    const section = btn.closest('.settings-section');
                    if (!section) return;

                    const form = section.querySelector('form') || section;
                    const inputs = form.querySelectorAll('input, select, textarea');
                    const data = {};

                    inputs.forEach(input => {
                        if (input.name || input.id) {
                            const key = input.name || input.id;
                            data[key] = input.value;
                        }
                    });

                    try {
                        showLoading(true);
                        const result = await Auth.fetch('/api/account/update', {
                            method: 'POST',
                            body: JSON.stringify(data)
                        });

                        showLoading(false);

                        if (result && result.success) {
                            alert('Settings saved successfully!');
                        } else {
                            alert('Error saving settings: ' + (result?.error || 'Unknown error'));
                        }
                    } catch (error) {
                        showLoading(false);
                        console.error('Error saving settings:', error);
                        alert('Error: ' + error.message);
                    }
                });
            });

            // Add click handlers to logout buttons
            document.querySelectorAll('button').forEach(btn => {
                if (btn.textContent.includes('Logout')) {
                    btn.addEventListener('click', () => {
                        Auth.logout();
                    });
                }
            });
        }

        // Initialize on page ready
        document.addEventListener('DOMContentLoaded', initAccountSettings);
    </script>
    <script src="/js/public-theme.js"></script>
    <script src="/js/branding.js"></script>
</body>
</html>
