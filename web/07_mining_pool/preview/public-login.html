<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[PREVIEW] Login | Grin Pool ツ</title>
<style>
:root{--bg-body:#000;--bg-card:#050505;--bg-card2:#0a0a0a;--text:#c0ffc0;--text-dim:#4a8a4a;--accent:#00ff41;--accent2:#00cc33;--border:#0d2e0d;--btn-bg:#00ff41;--btn-text:#000;--btn-hover:#00cc33;--input-bg:#040d04;--input-border:#0d2e0d;--error-color:#ff4444;--ok-color:#00ff41;--warn-color:#f2c94c;--grin-yellow:#f2c94c;--font-mono:'Courier New',Courier,monospace;--font-sans:'Courier New',Courier,monospace;--radius:6px;--shadow:0 2px 20px rgba(0,255,65,.08)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg-body);color:var(--text);font-family:var(--font-sans);line-height:1.6;min-height:100vh;display:flex;flex-direction:column}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
.container{max-width:1060px;margin:0 auto;padding:0 1rem}
header{padding:1rem 0;border-bottom:1px solid var(--border);background:var(--bg-body)}
.header-inner{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.6rem}
.site-title{font-size:1.35rem;font-weight:700;color:var(--accent);font-family:var(--font-mono);text-shadow:0 0 8px rgba(0,255,65,.6)}
.site-title span{color:var(--grin-yellow)}
.nav-links{display:flex;align-items:center;gap:.2rem;flex-wrap:wrap}
.nav-links a{color:var(--text-dim);font-size:.88rem;padding:.3rem .65rem;border-radius:var(--radius);transition:color .15s,background .15s}
.nav-links a:hover,.nav-links a.active{color:var(--accent);background:var(--bg-card);text-decoration:none}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}
.auth-box{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;width:100%;max-width:380px;box-shadow:var(--shadow)}
.auth-box h2{font-size:1.15rem;font-weight:700;color:var(--accent);margin-bottom:1.4rem;font-family:var(--font-mono);text-align:center}
.form-group{margin-bottom:1rem}
label{font-size:.85rem;color:var(--text-dim);display:block;margin-bottom:.35rem}
input[type="text"],input[type="password"]{width:100%;background:var(--input-bg);border:1px solid var(--input-border);border-radius:var(--radius);color:var(--text);padding:.6rem .8rem;font-family:var(--font-sans);font-size:.9rem;transition:border-color .15s}
input:focus{outline:none;border-color:var(--accent)}
.btn{display:inline-block;background:var(--btn-bg);color:var(--btn-text);border:none;border-radius:var(--radius);padding:.65rem 1.4rem;font-weight:700;font-size:.95rem;cursor:pointer;transition:background .15s;text-decoration:none}
.btn:hover{background:var(--btn-hover);text-decoration:none}
.btn-full{width:100%;margin-top:.6rem;display:block;text-align:center}
.error-msg{color:var(--error-color);font-size:.85rem;margin-top:.45rem;display:block}
.divider{text-align:center;color:var(--text-dim);font-size:.82rem;margin:1rem 0;position:relative}
.divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:var(--border)}
.divider span{background:var(--bg-card);padding:0 .8rem;position:relative}
.lockout-notice{background:rgba(255,68,68,.08);border:1px solid var(--error-color);border-radius:var(--radius);padding:.8rem 1rem;font-size:.82rem;color:var(--error-color);margin-bottom:1rem;display:none}
footer{padding:1.5rem 0;border-top:1px solid var(--border);text-align:center;font-size:.8rem;color:var(--text-dim)}
footer a{color:var(--text-dim)}footer a:hover{color:var(--accent)}
.preview-badge{position:fixed;bottom:1rem;right:1rem;background:#7a5c00;color:var(--grin-yellow);font-size:.75rem;padding:.35rem .7rem;border-radius:var(--radius);border:1px solid var(--grin-yellow);font-family:var(--font-mono);z-index:999}
</style>
</head>
<body>

<header>
  <div class="container">
    <div class="header-inner">
      <div class="site-title"><a href="public-home.html">Grin Pool <span>ツ</span></a></div>
      <nav class="nav-links">
        <a href="public-home.html">Home</a>
        <a href="public-login.html" class="active">Login</a>
        <a href="public-register.html">Register</a>
      </nav>
    </div>
  </div>
</header>

<main>
  <div class="auth-box">
    <h2>// login</h2>

    <!-- shown when account is locked out -->
    <div class="lockout-notice" style="display:block">
      Too many failed attempts. Try again in <strong>12 minutes</strong>.
    </div>

    <form>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" value="satoshi" autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" value="••••••••••">
        <div class="error-msg" style="display:none">Invalid username or password.</div>
      </div>
      <button type="submit" class="btn btn-full">Login</button>
    </form>

    <div class="divider"><span>or</span></div>

    <p style="text-align:center;font-size:.85rem;color:var(--text-dim)">
      No account? <a href="public-register.html">Register here</a>
    </p>
  </div>
</main>

<footer>
  <div class="container">
    <a href="public-home.html">Home</a>
    &nbsp;·&nbsp;
    <a href="https://grin.mw" target="_blank">grin.mw</a>
  </div>
</footer>

<div class="preview-badge">PREVIEW — public-login</div>
</body>
</html>
