<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <defs>
    <linearGradient id="gradientBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Round background -->
  <rect width="64" height="64" rx="12" fill="url(#gradientBg)"/>

  <!-- Pickaxe icon (mining symbol) -->
  <g transform="translate(32, 32)" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <!-- Pickaxe handle -->
    <line x1="-4" y1="-12" x2="8" y2="10"/>

    <!-- Pickaxe head (angled pick on left) -->
    <path d="M -4 -12 L -10 -18 L -6 -12 Z" stroke="white" stroke-width="2.5" fill="white"/>

    <!-- Pickaxe head (flat end on right) -->
    <rect x="6" y="8" width="4" height="8" fill="white"/>

    <!-- Coin symbol below (representing value/mining) -->
    <circle cx="0" cy="18" r="6" fill="none" stroke="white" stroke-width="1.5"/>
    <text x="0" y="20" text-anchor="middle" font-size="8" fill="white" font-family="Arial, sans-serif">₿</text>
  </g>
</svg>
