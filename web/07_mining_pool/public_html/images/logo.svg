<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80">
  <defs>
    <linearGradient id="gradientMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="glowEffect">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background pill shape -->
  <rect width="200" height="80" rx="16" fill="#0f1419" opacity="0.3"/>

  <!-- Icon circle -->
  <circle cx="30" cy="40" r="22" fill="url(#gradientMain)" filter="url(#glowEffect)"/>

  <!-- Pickaxe icon inside circle -->
  <g transform="translate(30, 40)" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Pickaxe handle -->
    <line x1="-3" y1="-8" x2="5" y2="6"/>

    <!-- Pickaxe head (pick) -->
    <path d="M -3 -8 L -7 -12 L -3 -8 Z" stroke="white" stroke-width="2" fill="white"/>

    <!-- Pickaxe head (flat) -->
    <rect x="4" y="5" width="2.5" height="5" fill="white"/>

    <!-- Mining sparkles -->
    <circle cx="-6" cy="-14" r="1" fill="white"/>
    <circle cx="8" cy="12" r="1" fill="white"/>
  </g>

  <!-- Text: GRINIUM -->
  <text x="62" y="50" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">GRINIUM</text>

  <!-- Subtitle: Mining Pool -->
  <text x="62" y="65" font-family="Arial, sans-serif" font-size="10" fill="#a0aec0" letter-spacing="1">MINING POOL</text>

  <!-- Accent line -->
  <rect x="62" y="35" width="125" height="2" rx="1" fill="url(#gradientMain)"/>
</svg>
