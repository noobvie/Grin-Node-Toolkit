<!DOCTYPE html>
<html lang="en" data-page="content">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading…</title>
  <link rel="stylesheet" href="/css/dashboard.css">
  <style>
    .content {
      max-width: 820px; margin: 0 auto; padding: 2.5rem 1.5rem;
    }
    .content h1 { font-size: 2rem; margin-top: 0; }
    .content h2 { color: var(--accent); margin-top: 2rem; }
    .content a { color: var(--accent); }
    .content img { max-width: 100%; height: auto; }
    .muted { color: var(--text-dim); }
  </style>
  <link rel="stylesheet" href="/css/themes.css">
</head>
<body>
    <!-- header injected by /js/public-shell.js -->

  <main class="content">
    <h1 id="page-title" class="muted">Loading…</h1>
    <div id="page-body"></div>
  </main>

    <!-- footer injected by /js/public-shell.js -->

  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var key = (params.get('p') || '').replace(/[^a-z0-9_-]/gi, '');
      if (!key) { renderMissing(); return; }

      fetch('/api/public/page/' + encodeURIComponent(key))
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (json) {
          if (!json || !json.data) { renderMissing(); return; }
          document.title = json.data.title;
          var t = document.getElementById('page-title');
          t.textContent = json.data.title;
          t.classList.remove('muted');
          document.getElementById('page-body').innerHTML = json.data.html; // operator-authored
          // Set the page key so per-page SEO overrides can target it.
          document.documentElement.setAttribute('data-page', 'page-' + key);
        })
        .catch(renderMissing);

      function renderMissing() {
        document.title = 'Page not found';
        document.getElementById('page-title').textContent = 'Page not found';
        document.getElementById('page-body').innerHTML = '<p class="muted">This page is not available. <a href="/">Return home</a>.</p>';
      }
    })();
  </script>
  <script src="/js/public-shell.js"></script>
  <script src="/js/public-theme.js"></script>
  <script src="/js/branding.js"></script>
</body>
</html>
