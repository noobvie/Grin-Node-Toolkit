<!DOCTYPE html>
<html lang="en" data-page="login" data-maintenance="exempt">
<head>
  <!-- ===== ESSENTIAL META TAGS ===== -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="robots" content="index, follow, max-snippet:-1">
  <meta name="language" content="English">
  <meta name="author" content="GRINIUM Mining Pool">

  <!-- ===== DESCRIPTION & KEYWORDS ===== -->
  <title>Admin Portal Login | GRINIUM Mining Pool Dashboard</title>
  <meta name="description" content="Secure admin login portal for GRINIUM mining pool. Access your dashboard, manage account settings, monitor mining statistics, and view withdrawal history.">
  <meta name="keywords" content="mining pool login, admin dashboard, account management, mining statistics, pool management">

  <!-- ===== OPEN GRAPH ===== -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="GRINIUM Mining Pool — Admin Login">
  <meta property="og:description" content="Secure admin access to mining pool dashboard and account management">
  <meta property="og:url" content="https://pool.grin.money/login.html">
  <meta property="og:site_name" content="GRINIUM Mining Pool">
  <meta property="og:image" content="https://pool.grin.money/images/og-login.svg">

  <!-- ===== TWITTER CARD ===== -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="GRINIUM Admin Portal">
  <meta name="twitter:description" content="Secure mining pool login and dashboard access">
  <meta name="twitter:domain" content="pool.grin.money">

  <!-- ===== CANONICAL ===== -->
  <link rel="canonical" href="https://pool.grin.money/login.html">

  <!-- ===== ADDITIONAL SEO ===== -->
  <meta name="theme-color" content="#0f1419">
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #667eea;
      --secondary: #764ba2;
      --danger: #f56565;
      --success: #48bb78;
      --bg-primary: #0f1419;
      --bg-card: #1a202c;
      --border-color: #2d3748;
      --text-primary: #ffffff;
      --text-secondary: #cbd5e0;
      --text-muted: #a0aec0;
    }

    body {
      background: linear-gradient(135deg, var(--bg-primary), #1a1f2e);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .login-container {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo p {
      color: var(--text-muted);
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: var(--text-primary);
      font-size: 0.95rem;
    }

    input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(102, 126, 234, 0.05);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 0.95rem;
      transition: all 0.2s ease;
    }

    input::placeholder {
      color: var(--text-muted);
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    button {
      width: 100%;
      padding: 0.875rem;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error {
      background: rgba(245, 101, 101, 0.1);
      color: var(--danger);
      padding: 1rem;
      border-radius: 6px;
      border-left: 4px solid var(--danger);
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
      display: none;
    }

    .success {
      background: rgba(72, 187, 120, 0.1);
      color: var(--success);
      padding: 1rem;
      border-radius: 6px;
      border-left: 4px solid var(--success);
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
      display: none;
    }

    .register-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.95rem;
      color: var(--text-secondary);
    }

    .register-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .register-link a:hover {
      opacity: 0.8;
      text-decoration: underline;
    }

    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(102, 126, 234, 0.2);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 0.5rem;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 1.5rem;
      }

      .logo h1 {
        font-size: 1.5rem;
      }
    }
  </style>
  <link rel="stylesheet" href="/css/themes.css">
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <h1>⛏ GRINIUM</h1>
      <p>Mining Pool Admin</p>
    </div>

    <div class="error" id="error-msg"></div>
    <div class="success" id="success-msg"></div>

    <div id="login-form">
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter admin username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter admin password" required>
        </div>
        <button type="submit" id="login-btn">Login</button>
      </form>
      <div class="register-link">
        New admin? <a onclick="toggleRegister(event)">Register here</a>
      </div>
    </div>

    <div id="register-form" style="display: none;">
      <form onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="reg-username">Username</label>
          <input type="text" id="reg-username" name="username" placeholder="Choose username (3+ chars)" required>
        </div>
        <div class="form-group">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" name="password" placeholder="Choose password (8+ chars)" required>
        </div>
        <button type="submit" id="register-btn">Create Admin Account</button>
      </form>
      <div class="register-link">
        Already have account? <a onclick="toggleRegister(event)">Login</a>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 5000);
    }

    function showSuccess(msg) {
      const el = document.getElementById('success-msg');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 5000);
    }

    function toggleRegister(e) {
      e.preventDefault();
      document.getElementById('login-form').style.display =
        document.getElementById('login-form').style.display === 'none' ? 'block' : 'none';
      document.getElementById('register-form').style.display =
        document.getElementById('register-form').style.display === 'none' ? 'block' : 'none';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');

      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span>Logging in...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
          credentials: 'include'  // FIX #4: Include httpOnly cookies
        });

        const data = await res.json();

        if (data.success) {
          // FIX #4: Token is now in httpOnly cookie, not in response body
          // No need to store anything in localStorage
          window.location.href = '/admin-dashboard.html';
        } else {
          showError(data.error || 'Login failed');
        }
      } catch (err) {
        showError('Connection error: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Login';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const username = document.getElementById('reg-username').value;
      const password = document.getElementById('reg-password').value;
      const btn = document.getElementById('register-btn');

      if (username.length < 3) {
        showError('Username must be at least 3 characters');
        return;
      }

      if (password.length < 8) {
        showError('Password must be at least 8 characters');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span>Creating...';

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
          credentials: 'include'  // FIX #4: Include httpOnly cookies
        });

        const data = await res.json();

        if (data.success) {
          showSuccess('Admin account created! Logging in...');
          setTimeout(() => {
            document.getElementById('username').value = username;
            document.getElementById('password').value = password;
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('register-form').style.display = 'none';
            handleLogin(new Event('submit'));
          }, 1000);
        } else {
          showError(data.error || 'Registration failed');
        }
      } catch (err) {
        showError('Connection error: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Create Admin Account';
      }
    }

    // FIX #4: Check if already logged in by testing API access (token in httpOnly cookie).
    // Must hit an AUTH-GATED endpoint — /api/health is public and 200 for everyone, which
    // would redirect every visitor to the dashboard (and loop). /api/admin/dashboard returns
    // 200 only with a valid admin cookie, so a logged-out visitor stays on this page.
    async function checkIfLoggedIn() {
      try {
        const res = await fetch('/api/admin/dashboard', { credentials: 'include' });
        if (res.status === 200) {
          window.location.href = '/admin-dashboard.html';
        }
      } catch (e) {
        // Not logged in, stay on login page
      }
    }

    checkIfLoggedIn();
  </script>
  <script src="/js/public-theme.js"></script>
  <script src="/js/branding.js"></script>
</body>
</html>
