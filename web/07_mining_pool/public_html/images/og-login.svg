<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="loginGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1419;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a202c;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#loginGradient)"/>
  <rect width="1200" height="8" fill="#667eea"/>

  <!-- Left side - Icon -->
  <circle cx="200" cy="315" r="100" fill="#667eea" opacity="0.1" stroke="#667eea" stroke-width="2"/>
  <g transform="translate(200, 315)" stroke="#667eea" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M -30 -20 L -30 -40 Q -30 -50 -20 -50 L 20 -50 Q 30 -50 30 -40 L 30 20 Q 30 30 20 30 L -20 30 Q -30 30 -30 20 Z" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="12" fill="none"/>
    <path d="M -5 8 L 5 8" stroke-width="2.5"/>
  </g>

  <!-- Right side - Text -->
  <text x="400" y="150" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="white">Admin Portal</text>

  <text x="400" y="240" font-family="Arial, sans-serif" font-size="32" fill="#667eea">Secure Access</text>

  <text x="400" y="320" font-family="Arial, sans-serif" font-size="20" fill="#cbd5e0">
    <tspan x="400" y="320">✓ Manage mining operations</tspan>
    <tspan x="400" y="360">✓ Monitor pool statistics</tspan>
    <tspan x="400" y="400">✓ Control miner settings</tspan>
    <tspan x="400" y="440">✓ View payment history</tspan>
  </text>

  <!-- Security badge -->
  <g transform="translate(400, 520)">
    <rect width="200" height="60" rx="8" fill="#48bb78" opacity="0.1" stroke="#48bb78" stroke-width="2"/>
    <text x="100" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#48bb78" font-weight="bold">🔒 Encrypted Login</text>
  </g>

  <rect y="622" width="1200" height="8" fill="#764ba2"/>
</svg>
