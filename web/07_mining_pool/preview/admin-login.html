<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Grin Mining Pool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --success: #48bb78;
            --danger: #f56565;
            --text-dark: #1a202c;
            --text-light: #718096;
            --bg-dark: #0f172a;
            --bg-card: #1a2342;
            --border-color: #2d3748;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1a2342 100%);
            color: var(--text-light);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-text {
            font-size: 2em;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .logo-sub {
            color: var(--text-light);
            font-size: 0.9em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: var(--text-light);
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: white;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.2);
        }

        .login-button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .remember-me {
            display: flex;
            align-items: center;
            margin-top: 15px;
        }

        input[type="checkbox"] {
            margin-right: 8px;
            cursor: pointer;
        }

        .remember-me label {
            margin: 0;
            font-weight: normal;
            cursor: pointer;
        }

        .alert {
            background: rgba(245, 101, 101, 0.1);
            border-left: 4px solid var(--danger);
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 0.9em;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-text {
            color: #fc8181;
        }

        .help-text {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9em;
        }

        .help-text a {
            color: var(--primary);
            text-decoration: none;
        }

        .help-text a:hover {
            text-decoration: underline;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9em;
        }

        .back-link a {
            color: var(--primary);
            text-decoration: none;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .demo-credentials {
            background: rgba(72, 187, 120, 0.1);
            border-left: 4px solid var(--success);
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 0.85em;
        }

        .demo-credentials p {
            margin: 5px 0;
            color: var(--text-light);
        }

        .demo-credentials strong {
            color: var(--success);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-text">🔐 Grin Pool</div>
                <div class="logo-sub">Admin Portal</div>
            </div>

            <div class="demo-credentials">
                <p><strong>Demo Login:</strong></p>
                <p>Username: <code style="background: var(--bg-dark); padding: 2px 6px; border-radius: 3px;">admin</code></p>
                <p>Password: <code style="background: var(--bg-dark); padding: 2px 6px; border-radius: 3px;">demo123</code></p>
            </div>

            <form onsubmit="handleLogin(event)">
                <div class="alert" id="errorAlert">
                    <div class="alert-text" id="errorText">Invalid credentials</div>
                </div>

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username" value="admin">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" value="demo123">
                </div>

                <div class="remember-me">
                    <input type="checkbox" id="remember" name="remember" checked>
                    <label for="remember">Remember me</label>
                </div>

                <button type="submit" class="login-button">Sign In</button>
            </form>

            <div class="help-text">
                <p>Forgot your password? <a href="#">Reset here</a></p>
            </div>

            <div class="back-link">
                <a href="index.html">← Back to Preview Index</a>
            </div>
        </div>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (username === 'admin' && password === 'demo123') {
                // Redirect to dashboard
                window.location.href = 'admin-dashboard.html';
            } else {
                // Show error
                const alert = document.getElementById('errorAlert');
                alert.classList.add('show');
                setTimeout(() => alert.classList.remove('show'), 3000);
            }
        }
    </script>
</body>
</html>
